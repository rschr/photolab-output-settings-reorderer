# Toolbar
button.open=Open\u2026
button.moveUp=\u2191 Up
button.moveDown=\u2193 Down
button.remove=\u2715 Remove
button.restoreBackup=Restore Backup\u2026
button.revert=Revert
button.save=Save Changes

# Open dialog
dialog.open.chooserTitle=Open user.config
dialog.open.filterDesc=PhotoLab config (user.config)
dialog.open.title=Open PhotoLab Config
dialog.open.header=Multiple PhotoLab installations found.\nSelect the user.config to open:
dialog.open.content=Installation:
dialog.open.otherButton=Other\u2026

# Remove dialog
dialog.remove.title=Remove Option
dialog.remove.header=Remove "{0}"?
dialog.remove.content=This will remove the export option from the list.

# Revert dialog
dialog.revert.title=Revert Changes
dialog.revert.header=Discard all changes?
dialog.revert.content=All unsaved changes will be lost and the list will be reloaded from the file.

# Restore backup dialog
dialog.restore.chooserTitle=Select Backup to Restore
dialog.restore.unexpectedTitle=Unexpected File
dialog.restore.unexpectedHeader="{0}" does not look like a user.config backup.
dialog.restore.unexpectedContent=Only files whose name starts with 'user.config' should be restored. Proceed anyway?
dialog.restore.confirmTitle=Confirm Restore
dialog.restore.confirmHeader=Restore from "{0}"?
dialog.restore.confirmContent=The current user.config will first be backed up, then overwritten with the selected file.

# Exit confirmation
dialog.exit.title=Unsaved Changes
dialog.exit.header=Exit with unsaved changes?
dialog.exit.content=Any unsaved changes will be lost.

# Errors
error.load.title=Failed to load file
error.save.title=Failed to save
error.restore.title=Restore failed

# Status bar
status.loaded=Loaded {0} output settings.
status.saved=Saved successfully at {0}  (backup created)
status.reverted=Reverted to saved file.
status.restored=Restored from "{0}" at {1}.
status.illegalChar=Illegal symbol
