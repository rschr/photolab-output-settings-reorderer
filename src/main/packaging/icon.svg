<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Background: rounded square in dark teal -->
  <rect width="256" height="256" rx="40" ry="40" fill="#1a5276"/>

  <!-- Three horizontal bars (shifted up 29px to vertically centre the block) -->
  <rect x="48" y="43"  width="130" height="14" rx="7" fill="#ffffff" opacity="0.9"/>
  <rect x="48" y="76"  width="130" height="14" rx="7" fill="#ffffff" opacity="0.9"/>
  <rect x="48" y="109" width="130" height="14" rx="7" fill="#ffffff" opacity="0.9"/>

  <!-- Up/down arrows suggesting reordering -->
  <polygon points="228,53  218,71 238,71" fill="#5dade2" opacity="0.95"/>
  <polygon points="228,103 218,85 238,85" fill="#5dade2" opacity="0.95"/>

  <!-- "DXO PL" label -->
  <text x="128" y="167"
        font-family="Arial, Helvetica, sans-serif"
        font-size="40"
        font-weight="bold"
        fill="#ffffff"
        text-anchor="middle"
        textLength="160"
        lengthAdjust="spacing">DXO PL</text>

  <!-- "OSR" label — same rendered width as "DXO PL" -->
  <text x="128" y="208"
        font-family="Arial, Helvetica, sans-serif"
        font-size="30"
        font-weight="bold"
        fill="#5dade2"
        text-anchor="middle"
        textLength="160"
        lengthAdjust="spacing">OSR</text>
</svg>
